<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años - La Bella Durmiente</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffeef2; /* Rosa muy claro */
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: #5a3e45;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .invitacion {
            background-color: #ffffff;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 5px double #ffb7c5; /* Borde rosa suave */
            position: relative;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #d81b60; /* Rosa intenso */
            margin-bottom: 10px;
        }

        .subtitulo {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #f06292;
        }

        .seccion {
            margin: 30px 0;
            border-top: 1px solid #fce4ec;
            padding-top: 20px;
        }

        .fecha {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .boton {
            background-color: #f06292;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 25px;
            display: inline-block;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .boton:hover {
            background-color: #d81b60;
        }

        /* Adorno de "Rosa" o Castillo */
        .decoracion {
            font-size: 2rem;
            color: #ffb7c5;
        }
    </style>
</head>
<body>

    <div class="invitacion">
        <div class="decoracion">✿</div>
        <p class="subtitulo">Mis XV Años</p>
        <h1>Nombre de la Quinceañera</h1>
        
        <p>"Había una vez un sueño que se hizo realidad..."</p>

        <div class="seccion">
            <p class="fecha">Sábado, 20 de Mayo de 2026</p>
            <p>19:00 Horas</p>
        </div>

        <div class="seccion">
            <h3>Lugar de la Recepción</h3>
            <p>Salón de Eventos "El Castillo Real"<br>
            Calle de las Rosas #123, Ciudad Mágica</p>
        </div>

        <a href="https://maps.google.com" class="boton" target="_blank">Ver Ubicación</a>
        <br>
        <a href="https://wa.me/tu-numero" class="boton" style="background-color: #880e4f;">Confirmar Asistencia</a>
        
        <div class="decoracion" style="margin-top: 30px;">🏰</div>
    </div>

</body>
</html>
